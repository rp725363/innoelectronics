<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Innoelectronics</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #000; /* Matte black background */
        min-height: 100vh;
        margin: 0;
        color: #fff; /* White text */
        position: relative;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="0.5" fill="%231976ff" opacity="0.05"/><circle cx="20" cy="30" r="0.3" fill="%23ffffff" opacity="0.03"/><circle cx="80" cy="70" r="0.4" fill="%231976ff" opacity="0.05"/></svg>')
          repeat;
        animation: float 40s infinite linear;
        z-index: -1;
      }
      @keyframes float {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-100px);
        }
      }
      .checkout-container {
        background: rgba(30, 30, 30, 0.9); /* Dark matte background */
        border: 1px solid rgba(25, 118, 255, 0.2);
        border-radius: 15px;
        padding: 40px;
        margin: 50px auto;
        max-width: 800px;
        box-shadow: 0 0 30px rgba(25, 118, 255, 0.2);
        color: #fff; /* White text */
        position: relative;
        overflow: hidden;
      }
      .checkout-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          circle at center,
          rgba(25, 118, 255, 0.05) 0%,
          transparent 70%
        );
        animation: pulse 5s ease-in-out infinite;
        z-index: -1;
      }
      .checkout-container h1 {
        color: #1976ff; /* Blue text */
        text-shadow: 0 1px 0 #000, 0 2px 0 #000, 0 3px 0 #000, 0 4px 0 #000,
          0 5px 10px rgba(25, 118, 255, 0.5); /* 3D effect */
        font-weight: bold;
        animation: glow 3s ease-in-out infinite alternate;
      }
      .checkout-container h4 {
        color: #1976ff; /* Blue text */
        text-shadow: 0 1px 0 #000, 0 2px 3px rgba(25, 118, 255, 0.3); /* 3D effect */
      }
      @keyframes glow {
        from {
          text-shadow: 0 1px 0 #000, 0 2px 0 #000, 0 3px 0 #000, 0 4px 0 #000,
            0 5px 10px rgba(25, 118, 255, 0.5);
        }
        to {
          text-shadow: 0 1px 0 #000, 0 2px 0 #000, 0 3px 0 #000, 0 4px 0 #000,
            0 5px 20px rgba(25, 118, 255, 0.8);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.6;
        }
      }
      .form-label {
        color: #fff; /* White text */
        text-shadow: 0 1px 0 #000, 0 2px 2px rgba(255, 255, 255, 0.2); /* 3D effect */
      }
      .form-control {
        background: rgba(40, 40, 40, 0.9);
        border: 1px solid rgba(25, 118, 255, 0.2);
        color: #fff; /* White text */
        border-radius: 10px;
      }
      .form-control:focus {
        background: rgba(40, 40, 40, 0.9);
        border-color: #1976ff;
        box-shadow: 0 0 10px rgba(25, 118, 255, 0.3);
        color: #fff;
      }
      .btn-submit {
        background: linear-gradient(45deg, #ff6b6b, #ff4081);
        color: #fff;
        border: none;
        padding: 15px 30px;
        border-radius: 50px;
        transition: all 0.3s ease;
        box-shadow: 0 0 15px rgba(255, 104, 107, 0.3);
        animation: pulse 3s ease-in-out infinite;
      }
      .btn-submit:hover {
        background: linear-gradient(45deg, #e05555, #e0356a);
        transform: translateY(-3px);
        box-shadow: 0 0 25px rgba(255, 104, 107, 0.6);
      }
      .btn-back {
        background: linear-gradient(45deg, #1976ff, #00bcd4);
        color: #fff;
        border: none;
        padding: 10px 20px;
        border-radius: 50px;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgba(25, 118, 255, 0.3);
      }
      .btn-back:hover {
        background: linear-gradient(45deg, #1556ba, #0097a7);
        transform: translateY(-3px);
        box-shadow: 0 0 20px rgba(25, 118, 255, 0.6);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <img
            src="/static/images/innoelectronics_logo_rect.png"
            alt="Innoelectronics Logo"
            style="height: 40px; margin-right: 10px"
          />
          Innoelectronics
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/cart">Cart</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">About</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="checkout-container">
        <h1 class="mb-4">Checkout</h1>
        <form action="/checkout" method="post">
          <div class="row">
            <div class="col-md-6">
              <h4>Customer Information</h4>
              <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="name"
                  name="name"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input
                  type="tel"
                  class="form-control"
                  id="phone"
                  name="phone"
                  required
                />
              </div>
            </div>
            <div class="col-md-6">
              <h4>Shipping Address</h4>
              <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <textarea
                  class="form-control"
                  id="address"
                  name="address"
                  rows="4"
                  required
                ></textarea>
              </div>
            </div>
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-submit">Submit Order</button>
            <a href="/cart" class="btn btn-back ms-2">Back to Cart</a>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
